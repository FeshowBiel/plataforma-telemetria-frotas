services:
  # ==========================================
  # 1. CAMADA DE ARMAZENAMENTO E MENSAGERIA
  # ==========================================
  postgres_db:
    image: postgres:15-alpine
    container_name: frotas_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: frotas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - frotas_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: frotas_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@frotas.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    networks:
      - frotas_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: frotas_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - frotas_network

  # ==========================================
  # 2. CAMADA DE APLICAÇÃO (BACKEND E WORKER)
  # ==========================================
  api_backend:
    build: ./backend
    container_name: frotas_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
      - postgres_db
    networks:
      - frotas_network

  worker:
    build: ./worker
    container_name: frotas_worker
    restart: always
    depends_on:
      - rabbitmq
      - postgres_db
    networks:
      - frotas_network

  # ==========================================
  # 3. CAMADA DE VISUALIZAÇÃO (FRONTEND)
  # ==========================================
  frontend_dashboard:
    build: ./frontend
    container_name: frotas_frontend
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - postgres_db
    networks:
      - frotas_network

  # ==========================================
  # 4. CAMADA DE TRANSFORMAÇÃO (DBT)
  # ==========================================
  dbt_service:
    build: ./data_warehouse
    container_name: frotas_dbt
    command: tail -f /dev/null
    volumes:
      - ./data_warehouse:/usr/app/dbt
    networks:
      - frotas_network

  # ==========================================
  # 5. CAMADA DE ORQUESTRAÇÃO (AIRFLOW + DBT NATIVO)
  # ==========================================
  airflow-webserver:
    image: apache/airflow:2.7.1-python3.11
    container_name: frotas_airflow_webserver
    restart: always
    depends_on:
      - postgres_db
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:admin_password@postgres_db:5432/frotas_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=dbt-postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "5"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data_warehouse:/usr/app/dbt
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - frotas_network

  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.11
    container_name: frotas_airflow_scheduler
    restart: always
    depends_on:
      - postgres_db
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:admin_password@postgres_db:5432/frotas_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=dbt-postgres
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data_warehouse:/usr/app/dbt
    command: scheduler
    networks:
      - frotas_network

# ==========================================
# CONFIGURAÇÕES GERAIS DE REDE E VOLUMES
# ==========================================
networks:
  frotas_network:
    driver: bridge

volumes:
  postgres_data: